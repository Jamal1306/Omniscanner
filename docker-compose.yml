version: "3.9"

services:
  omniscanner:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omniscanner
    ports:
      - "8000:8000"
    volumes:
      - scanner_data:/app/data
      - ./frontend:/frontend:ro
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/scan_history.db
    cap_add:
      - NET_ADMIN
      - NET_RAW
    user: root
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  scanner_data:
    driver: local
